server.port=${SERVER_PORT:9090}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:9092/assafdb}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

security.jwt.secret-key=${JWT_SECRET_KEY}
admin.default.username=${ADMIN_USERNAME:admin}
admin.default.password=${ADMIN_PASSWORD}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:9091}

server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
